name: Execute test with Selenium Grid

on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard-id: [ 1,2,3,4 ]
    steps:
      - name: Check shard-id
        run: echo "This is shard id number ${{ matrix.shard-id }}"

      - name: Run Selenium Grid
        run: docker compose up -d --scale chrome=3 --scale firefox=3

      - uses: actions/checkout@v4

      - name: check docker status
        run: docker ps

      - name : Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Executing test
        run: mvn clean test \
          -DgridUrl=http://localhost:4444 \
          -Dbrowser=CHROME \
          -Dheadless=true \
          -DignoreFailure \
          -DtotalShards=4 \
          -DcurrentShard=${{ matrix.shard-id }}

  generate-report:
    needs : run-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: Automation Allure-report
          path: target/allure-results
          retention-days: 7

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        id: allure-report
        with:
          allure_results: target/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

  deploy-report:
    needs: generate-report
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Deploy report to Github Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

  tear-down:
    needs: deploy-report
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Tear down Grid
        if: always()
        run: docker compose down
