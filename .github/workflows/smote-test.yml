name : Running smoke test

on :
  workflow_dispatch:
    jobs :
      execute-test:
        runs-on: ubuntu-latest

        steps:
          - name: Get code from Github
            uses: actions/checkout@v4

          - name: install Java JDK 17
            uses: actions/setup-java@3
            with:
              java-versions: '17'
              distribution: 'temurin'
              cache: 'maven'

          - name: Execute automation test
            run: mvn clean test -Dcucumber.filter.tags=@smoke -Dheadless=true